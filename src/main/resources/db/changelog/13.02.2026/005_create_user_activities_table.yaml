databaseChangeLog:
  - changeSet:
      id: 13.02.2026_005_create_user_activities_table
      author: givan3819@gmail.com
      changes:
        - createTable:
            tableName: user_activities
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: raw_quantity
                  type: FLOAT8
              - column:
                  name: raw_unit
                  type: VARCHAR(50)
              - column:
                  name: quantity
                  type: INTEGER
              - column:
                  name: details
                  type: JSONB